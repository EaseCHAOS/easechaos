services:
  redis:
    image: redis:7.2.4-alpine3.19
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-localdev}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-localdev}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-localdev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: /bin/sh -c "uvicorn api.api:app --host 0.0.0.0 --port $PORT --reload"
    volumes:
      - ./api:/app/api
      - ./requirements.txt:/app/requirements.txt
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - PORT=${PORT:-8000}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-localdev}
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_API_URL=http://localhost:${PORT:-8000}/api/v1
    depends_on:
      - api

volumes:
  redis-data:
